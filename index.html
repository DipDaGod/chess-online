<!DOCTYPE html>
<html lang="en">
<head>
    <title>Chess</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app">
        <header>
            <h1>♟ Chess</h1>
        </header>
        <div class="game-wrap">
            <div id="status-bar">
                <div id="turn"></div>
            </div>
            <div id="board-wrap">
                <div id="board"></div>
            </div>
            <div class="controls">
                <button id="reset-btn">
                    <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-4.5"/></svg>
                    New Game
                </button>
            </div>
        </div>
    </div>
    <script type="module" src="script.js"></script>
</body>
</html>
